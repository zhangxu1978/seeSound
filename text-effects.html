<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字特效设计</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f1a 100%);
            min-height: 100vh;
            padding: 60px 40px;
            color: #fff;
        }

        h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 42px;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 8px;
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            letter-spacing: 4px;
            margin-bottom: 80px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 60px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .case {
            text-align: center;
            padding: 60px 40px;
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .case-title {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 40px;
        }

        .effect-text {
            font-family: 'Noto Serif SC', serif;
            font-weight: 700;
            display: inline-block;
        }

        /* ========================================
           Effect 1: Glass Text
           ======================================== */
        .glass-text {
            font-size: 56px;
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.6));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            backdrop-filter: blur(1px);
        }

        .glass-text::before {
            content: '光影';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(255,255,255,0.4));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: blur(2px);
            z-index: -1;
        }

        /* ========================================
           Effect 2: Neon Glow
           ======================================== */
        .neon-text {
            font-size: 64px;
            color: #fff;
            text-shadow:
                0 0 5px var(--accent-coral),
                0 0 10px var(--accent-coral),
                0 0 20px var(--accent-coral),
                0 0 40px var(--accent-coral),
                0 0 80px var(--accent-coral);
            animation: neonPulse 2s ease-in-out infinite alternate;
        }

        :root { --accent-coral: #ff6b6b; }

        @keyframes neonPulse {
            from {
                text-shadow:
                    0 0 5px var(--accent-coral),
                    0 0 10px var(--accent-coral),
                    0 0 20px var(--accent-coral),
                    0 0 40px var(--accent-coral);
                filter: brightness(1);
            }
            to {
                text-shadow:
                    0 0 10px var(--accent-coral),
                    0 0 20px var(--accent-coral),
                    0 0 40px var(--accent-coral),
                    0 0 60px var(--accent-coral),
                    0 0 100px var(--accent-coral);
                filter: brightness(1.2);
            }
        }

        /* ========================================
           Effect 3: Gradient Flow
           ======================================== */
        .gradient-text {
            font-size: 52px;
            background: linear-gradient(90deg,
                #ff6b6b, #ffe66d, #4ecdc4, #a855f7, #ff6b6b);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 4s linear infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        /* ========================================
           Effect 4: Stroke Fill
           ======================================== */
        .stroke-text {
            font-size: 60px;
            -webkit-text-stroke: 2px rgba(255,255,255,0.8);
            color: transparent;
            position: relative;
            transition: all 0.4s;
        }

        .stroke-text::before {
            content: '墨韵';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #4ecdc4, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .stroke-text:hover {
            -webkit-text-stroke: 2px transparent;
        }

        .stroke-text:hover::before {
            opacity: 1;
        }

        /* ========================================
           Effect 5: Float Shadow
           ======================================== */
        .float-shadow-text {
            font-size: 58px;
            position: relative;
            transition: all 0.4s;
        }

        .float-shadow-text::before {
            content: '浮光';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #ffe66d, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: blur(8px);
            opacity: 0.7;
            transform: translateY(8px);
            transition: all 0.4s;
        }

        .float-shadow-text:hover::before {
            filter: blur(12px);
            opacity: 1;
            transform: translateY(12px);
        }

        /* ========================================
           Effect 6: 3D Block
           ======================================== */
        .text-3d {
            font-size: 64px;
            position: relative;
            transform-style: preserve-3d;
            animation: textFloat 3s ease-in-out infinite;
        }

        .text-3d span {
            display: inline-block;
        }

        .text-3d span:nth-child(1) {
            color: #ff6b6b;
            text-shadow:
                2px 2px 0 #aa4444,
                4px 4px 0 #883333;
        }
        .text-3d span:nth-child(2) {
            color: #ffe66d;
            text-shadow:
                2px 2px 0 #ccaa33,
                4px 4px 0 #996622;
        }

        @keyframes textFloat {
            0%, 100% { transform: translateY(0) rotateX(0deg); }
            50% { transform: translateY(-10px) rotateX(5deg); }
        }

        /* ========================================
           Effect 7: Liquid Fill
           ======================================== */
        .liquid-text {
            font-size: 56px;
            position: relative;
            display: inline-block;
            overflow: hidden;
        }

        .liquid-text::before {
            content: '流彩';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #4ecdc4, #a855f7, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            clip-path: inset(0 100% 0 0);
            animation: liquidReveal 3s ease-in-out infinite;
        }

        @keyframes liquidReveal {
            0%, 100% { clip-path: inset(0 100% 0 0); }
            50% { clip-path: inset(0 0 0 0); }
        }

        /* ========================================
           Effect 8: Mirror
           ======================================== */
        .mirror-text {
            font-size: 48px;
            position: relative;
            transform: scaleY(-1);
            opacity: 0.3;
            filter: blur(1px);
        }

        .mirror-text::after {
            content: '幻影';
            position: absolute;
            left: 0;
            top: 100%;
            width: 100%;
            transform: scaleY(-1);
            background: linear-gradient(180deg, transparent, rgba(255,255,255,0.2));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.5;
        }

        .mirror-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .mirror-container .mirror-text {
            transform: none;
            opacity: 1;
            filter: none;
            background: linear-gradient(180deg, #fff 0%, #a855f7 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        /* ========================================
           Effect 9: Wave
           ======================================== */
        .wave-text {
            font-size: 52px;
            display: inline-block;
        }

        .wave-text span {
            display: inline-block;
            animation: wave 1.5s ease-in-out infinite;
        }

        .wave-text span:nth-child(1) { animation-delay: 0s; color: #ff6b6b; }
        .wave-text span:nth-child(2) { animation-delay: 0.1s; color: #ff8e6b; }
        .wave-text span:nth-child(3) { animation-delay: 0.2s; color: #ffb06b; }

        @keyframes wave {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* ========================================
           Effect 10: Outline Pulse
           ======================================== */
        .outline-text {
            font-size: 64px;
            color: transparent;
            -webkit-text-stroke: 3px rgba(255,255,255,0.8);
            position: relative;
            animation: outlinePulse 2s ease-in-out infinite;
        }

        @keyframes outlinePulse {
            0%, 100% {
                -webkit-text-stroke: 3px rgba(255,255,255,0.8);
                filter: drop-shadow(0 0 0 transparent);
            }
            50% {
                -webkit-text-stroke: 3px rgba(255,255,255,1);
                filter: drop-shadow(0 0 10px rgba(78, 205, 196, 0.8));
            }
        }

        /* ========================================
           Effect 11: Frosted
           ======================================== */
        .frosted-text {
            font-size: 54px;
            position: relative;
            backdrop-filter: blur(10px);
            -webkit-background-clip: text;
            background-clip: text;
            animation: frostedShift 4s ease-in-out infinite;
        }

        @keyframes frostedShift {
            0%, 100% {
                background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.5));
                -webkit-text-fill-color: transparent;
            }
            50% {
                background: linear-gradient(135deg, rgba(168,85,247,0.9), rgba(78,205,196,0.9));
                -webkit-text-fill-color: transparent;
            }
        }

        /* ========================================
           Effect 12: Matrix Rain
           ======================================== */
        .matrix-text {
            font-size: 48px;
            font-family: monospace;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            letter-spacing: 4px;
            animation: matrixFlicker 0.1s infinite;
        }

        @keyframes matrixFlicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .matrix-text span {
            display: inline-block;
            animation: matrixDrop 2s infinite;
        }

        .matrix-text span:nth-child(1) { animation-delay: 0s; }
        .matrix-text span:nth-child(2) { animation-delay: 0.3s; color: #0cf; text-shadow: 0 0 10px #0cf; }
        .matrix-text span:nth-child(3) { animation-delay: 0.6s; }

        @keyframes matrixDrop {
            0%, 100% { transform: translateY(0); opacity: 1; }
            50% { transform: translateY(5px); opacity: 0.7; }
        }

        /* ========================================
           Effect 13: Aqua
           ======================================== */
        .aqua-text {
            font-size: 60px;
            position: relative;
            color: transparent;
            background: linear-gradient(180deg,
                rgba(78,205,196,0.9) 0%,
                rgba(78,205,196,0.6) 50%,
                rgba(78,205,196,0.3) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .aqua-text::after {
            content: '水漾';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,
                transparent 0%,
                rgba(255,255,255,0.3) 50%,
                transparent 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: aquaShine 3s ease-in-out infinite;
        }

        @keyframes aquaShine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* ========================================
           Effect 14: Fire
           ======================================== */
        .fire-text {
            font-size: 60px;
            position: relative;
            animation: fireFlicker 0.15s infinite alternate;
        }

        .fire-text span {
            display: inline-block;
        }

        .fire-text span:nth-child(1) {
            color: #ff6b6b;
            text-shadow: 0 0 20px #ff6b6b, 0 -5px 10px #ff3d00;
        }
        .fire-text span:nth-child(2) {
            color: #ff8e6b;
            text-shadow: 0 0 20px #ff8e6b, 0 -5px 10px #ff5722;
        }

        @keyframes fireFlicker {
            0% { transform: scale(1) translateY(0); }
            100% { transform: scale(1.02) translateY(-2px); }
        }

        /* ========================================
           Effect 15: Ink
           ======================================== */
        .ink-text {
            font-size: 64px;
            position: relative;
            color: #1a1a2e;
            text-shadow:
                1px 1px 0 rgba(255,255,255,0.5),
                2px 2px 0 rgba(255,255,255,0.3),
                3px 3px 0 rgba(255,255,255,0.1);
        }

        .ink-text::before {
            content: '墨迹';
            position: absolute;
            inset: 0;
            color: transparent;
            -webkit-text-stroke: 1px rgba(100,100,100,0.3);
            animation: inkSpread 4s ease-in-out infinite;
        }

        @keyframes inkSpread {
            0%, 100% {
                transform: scale(1);
                opacity: 0.3;
            }
            50% {
                transform: scale(1.05);
                opacity: 0.5;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 28px; letter-spacing: 4px; }
            .gallery { grid-template-columns: 1fr; }
            .case { padding: 40px 20px; }
        }
    </style>
</head>
<body>
    <h1>文字特效</h1>
    <p class="subtitle">TEXT EFFECTS COLLECTION</p>

    <div class="gallery">
        <div class="case">
            <div class="case-title">Glass 毛玻璃</div>
            <div class="effect-text glass-text">光影</div>
        </div>

        <div class="case">
            <div class="case-title">Neon Glow 霓虹光晕</div>
            <div class="effect-text neon-text">流光</div>
        </div>

        <div class="case">
            <div class="case-title">Gradient Flow 渐变流动</div>
            <div class="effect-text gradient-text">幻彩</div>
        </div>

        <div class="case">
            <div class="case-title">Stroke Fill 描边填充</div>
            <div class="effect-text stroke-text">墨韵</div>
        </div>

        <div class="case">
            <div class="case-title">Float Shadow 浮动阴影</div>
            <div class="effect-text float-shadow-text">浮光</div>
        </div>

        <div class="case">
            <div class="case-title">3D Block 3D方块</div>
            <div class="effect-text text-3d"><span>霓</span><span>虹</span></div>
        </div>

        <div class="case">
            <div class="case-title">Liquid Fill 液态填充</div>
            <div class="effect-text liquid-text">流彩</div>
        </div>

        <div class="case">
            <div class="case-title">Mirror 镜像倒影</div>
            <div class="mirror-container">
                <div class="effect-text mirror-text">幻影</div>
            </div>
        </div>

        <div class="case">
            <div class="case-title">Wave 波浪文字</div>
            <div class="effect-text wave-text"><span>梦</span><span>幻</span><span>泡</span></div>
        </div>

        <div class="case">
            <div class="case-title">Outline Pulse 轮廓脉冲</div>
            <div class="effect-text outline-text">星辰</div>
        </div>

        <div class="case">
            <div class="case-title">Frosted 磨砂渐变</div>
            <div class="effect-text frosted-text">冰晶</div>
        </div>

        <div class="case">
            <div class="case-title">Matrix 矩阵代码</div>
            <div class="effect-text matrix-text"><span>数</span><span>码</span><span>世</span></div>
        </div>

        <div class="case">
            <div class="case-title">Aqua 水漾光泽</div>
            <div class="effect-text aqua-text">水漾</div>
        </div>

        <div class="case">
            <div class="case-title">Fire 火焰跳动</div>
            <div class="effect-text fire-text"><span>烈</span><span>焰</span></div>
        </div>

        <div class="case">
            <div class="case-title">Ink 墨迹层次</div>
            <div class="effect-text ink-text">墨迹</div>
        </div>
    </div>
</body>
</html>
